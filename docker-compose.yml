version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: paw8-postgres
    environment:
      POSTGRES_USER: paw8
      POSTGRES_PASSWORD: paw8_dev_password
      POSTGRES_DB: paw8_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paw8 -d paw8_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: paw8-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: paw8_minio_user
      MINIO_ROOT_PASSWORD: paw8_minio_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: paw8-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 paw8_minio_user paw8_minio_password;
      mc mb --ignore-existing local/pawn-platform;
      mc anonymous set none local/pawn-platform;
      echo 'MinIO bucket initialized';
      "

volumes:
  postgres_data:
  minio_data:
